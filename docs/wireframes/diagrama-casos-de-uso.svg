<svg xmlns="http://www.w3.org/2000/svg" width="860" height="560" viewBox="0 0 860 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="560" fill="#ffffff"/>
  <text x="430" y="34" font-size="18" fill="#243047" text-anchor="middle" font-weight="bold">Diagrama de Casos de Uso — CopaApostas 2026</text>

  <!-- Sistema (retângulo) -->
  <rect x="300" y="60" width="320" height="470" rx="8" fill="#f7f9fc" stroke="#9fb0c9"/>
  <text x="460" y="84" font-size="13" fill="#5b6a82" text-anchor="middle">Sistema CopaApostas 2026</text>

  <!-- Atores -->
  <!-- Visitante -->
  <g transform="translate(70,150)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#2c3a52" stroke-width="2"/>
    <line x1="0" y1="12" x2="0" y2="40" stroke="#2c3a52" stroke-width="2"/>
    <line x1="-16" y1="22" x2="16" y2="22" stroke="#2c3a52" stroke-width="2"/>
    <line x1="0" y1="40" x2="-14" y2="62" stroke="#2c3a52" stroke-width="2"/>
    <line x1="0" y1="40" x2="14" y2="62" stroke="#2c3a52" stroke-width="2"/>
    <text x="0" y="80" font-size="13" fill="#243047" text-anchor="middle">Visitante</text>
  </g>
  <!-- Apostador -->
  <g transform="translate(70,300)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#2c3a52" stroke-width="2"/>
    <line x1="0" y1="12" x2="0" y2="40" stroke="#2c3a52" stroke-width="2"/>
    <line x1="-16" y1="22" x2="16" y2="22" stroke="#2c3a52" stroke-width="2"/>
    <line x1="0" y1="40" x2="-14" y2="62" stroke="#2c3a52" stroke-width="2"/>
    <line x1="0" y1="40" x2="14" y2="62" stroke="#2c3a52" stroke-width="2"/>
    <text x="0" y="80" font-size="13" fill="#243047" text-anchor="middle">Apostador</text>
  </g>
  <!-- Admin -->
  <g transform="translate(790,300)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#2c3a52" stroke-width="2"/>
    <line x1="0" y1="12" x2="0" y2="40" stroke="#2c3a52" stroke-width="2"/>
    <line x1="-16" y1="22" x2="16" y2="22" stroke="#2c3a52" stroke-width="2"/>
    <line x1="0" y1="40" x2="-14" y2="62" stroke="#2c3a52" stroke-width="2"/>
    <line x1="0" y1="40" x2="14" y2="62" stroke="#2c3a52" stroke-width="2"/>
    <text x="0" y="80" font-size="13" fill="#243047" text-anchor="middle">Administrador</text>
  </g>

  <!-- Casos de uso (elipses) -->
  <g font-size="12" fill="#1f2b40" text-anchor="middle">
    <ellipse cx="460" cy="120" rx="120" ry="22" fill="#eef4ff" stroke="#6f86ad"/>
    <text x="460" y="124">UC01 - Criar conta</text>

    <ellipse cx="460" cy="172" rx="120" ry="22" fill="#eef4ff" stroke="#6f86ad"/>
    <text x="460" y="176">UC02 - Autenticar-se</text>

    <ellipse cx="460" cy="224" rx="120" ry="22" fill="#eef4ff" stroke="#6f86ad"/>
    <text x="460" y="228">UC03 - Visualizar jogos</text>

    <ellipse cx="460" cy="286" rx="120" ry="22" fill="#e9f7ef" stroke="#5aa57e"/>
    <text x="460" y="290">UC04 - Realizar aposta</text>

    <ellipse cx="460" cy="338" rx="120" ry="22" fill="#e9f7ef" stroke="#5aa57e"/>
    <text x="460" y="342">UC05 - Minhas apostas</text>

    <ellipse cx="460" cy="390" rx="120" ry="22" fill="#e9f7ef" stroke="#5aa57e"/>
    <text x="460" y="394">UC06 - Sair (logout)</text>

    <ellipse cx="460" cy="450" rx="120" ry="22" fill="#fdf0e3" stroke="#cf9a5a"/>
    <text x="460" y="454">UC07 - Registrar placar</text>

    <ellipse cx="460" cy="502" rx="120" ry="22" fill="#fdf0e3" stroke="#cf9a5a"/>
    <text x="460" y="506">UC08 - Gerenciar jogos</text>
  </g>

  <!-- Associações Visitante -->
  <g stroke="#8a97a8" stroke-width="1.3">
    <line x1="92" y1="170" x2="340" y2="120"/>
    <line x1="92" y1="172" x2="340" y2="172"/>
    <line x1="92" y1="176" x2="340" y2="222"/>
    <!-- Apostador -->
    <line x1="92" y1="318" x2="340" y2="224"/>
    <line x1="92" y1="320" x2="340" y2="286"/>
    <line x1="92" y1="322" x2="340" y2="338"/>
    <line x1="92" y1="326" x2="340" y2="390"/>
    <!-- Admin -->
    <line x1="768" y1="318" x2="580" y2="224"/>
    <line x1="768" y1="320" x2="580" y2="450"/>
    <line x1="768" y1="324" x2="580" y2="502"/>
  </g>
</svg>
